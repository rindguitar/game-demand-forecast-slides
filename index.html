### 今日のテーマ


<div class="simple-box" data-markdown>

1. 何を作っているのか？
2. レビューで学習とファインチューニングするだけで変わる？（OOD比較）

### 1. 何を作っているか？

<div class="simple-box" data-markdown>

* Steam APIの英語レビューを集め、**感情分析**するモデル
* ベースは **DistilBERT**。Steamレビュー（7ゲーム・計1万件）で学習
* 目的はレビューからゲーム需要予測に繋げること
* ラベルは `voted_up`（👍/👎）を流用 — 手軽だが**粗いproxy**（後で効いてくる）

</div>

---

### 2. レビューで学習とファインチューニングするだけで変わる？ <span style="font-size:0.6em"></span>

<div class="highlight-box" data-markdown>

* 自作モデルは、**未学習の汎用モデル**より本当に強いのか？
* 検証法：**OOD（Out-of-Distribution）テスト**
	* 学習に使っていない **20ゲーム・計2000件**で比較

</div>

<div class="simple-box" data-markdown>

* 自作（Steamレビュー学習）vs **sst-2**（同じBertベースで英語2クラス）

</div>

---

### 結果：ほぼ互角だった

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

| 指標 | 自作(Steam) | sst-2(汎用) |
|---|---|---|
| Accuracy | **86.5%** | 85.1% |
| Precision | 83.5% | **87.7%** |
| Recall | **91.0%** | 81.6% |
| F1 | **87.1%** | 84.6% |

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* Accuracyの差 +1.4pt は…
* **McNemar検定 p=0.105**
	* → **有意差なし（誤差圏）**
* 学習とファインチューニングの付加価値は限定的

</div>
</div>
</div>

---

### 変わったのは「偏り」

<div class="simple-box" data-markdown>

* 変わったのは**スキル**ではなく**判定の偏り**
	* 自作 = **Recall寄り**（ポジと言いすぎ → FP多・皮肉に弱い）
	* sst-2 = **Precision寄り**（慎重）
* 土台のDistilBERTが性能の大半を担っていた

</div>

<div class="highlight-box" data-markdown>

* 次の打ち手 → **DAPT**（ドメイン適応事前学習）で土台から鍛え直す

</div>

---

### 3. DAPTで汎用モデルに勝つ <span style="font-size:0.6em"></span>

<div class="highlight-box" data-markdown>

* **DAPT = Domain-Adaptive Pre-Training**
* Steamレビューを使い、穴埋め形式問題をモデルに行わせる → 「ゲーム界隈の言葉、文脈」に適応
* その土台の上で学習、微調整する

</div>

<div class="simple-box" data-markdown>

* **計10万件・572ゲーム**（OOD20＋学習7ゲームを除外＝リーケージ防止）

</div>

---

### 結果：汎用モデルに有意に勝利

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

**OOD（未知20ゲーム・2000件）**

| モデル | OOD Acc |
|---|---|
| **Self-DAPT** | **88.8%** |
| Self-preDAPT | 86.5% |
| SST-2 | 85.1% |

</div>
</div>
<div class="col-right">
<div class="simple-box" data-markdown>

**in-domain（1万件 test）**

| 指標 | pre | DAPT |
|---|---|---|
| Test Acc | 84.7% | **87.8%** |
| Train−Test gap | 12.8 | **7.4** |

過学習が縮小＝汎化向上

</div>
</div>
</div>

<div class="highlight-box" data-markdown>

* McNemar：DAPT vs preDAPT **p=0.0001**／DAPT vs sst-2 **p=0.0001**（ともに有意）

</div>

---

### DAPTは何を直したか

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

| | 直した | 壊した | 正味 |
|---|---|---|---|
| **FP** | 75 | 23 | **−52** |
| FN | 19 | 25 | +6 |
| 計 | 94 | 48 | **+46** |

純改善のほぼ全てが**FP削減**

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* 直したのは接続詞混合「**great … but terrible**」型
	* 否定語あり：57% vs 38%
	* 接続詞混合(but)：55% vs 38%
* 対比・否定の長文を**ポジと誤読しなくなった**
* 代償：短文でわずかに過慎重化

</div>
</div>
</div>

---

### 4. その差は運じゃない？ <span style="font-size:0.6em"></span>

<div class="highlight-box" data-markdown>

* 前の結果は **seed=42 の1回ずつ**。シードの運で出た差かもしれない
* 気づき：固定すべき乱数は2か所
	* データ分割（train・val・test）… 旧自作とDAPT後は**ここのみ固定**
	* **学習の内部**（重み初期化・shuffle・dropout）… **これが抜けていた**

</div>

<div class="simple-box" data-markdown>

* 学習を完全固定し、**別シード×1回ずつ**で 0〜14 の **15シード**を実行

</div>

---

### 結果：+2.3ptは「盛れていた」

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

**OOD Acc（n=15）**

| | mean ± SD |
|---|---|
| **DAPT** | **88.73% ± 0.54** |
| pre_dapt | 87.94% ± 0.78 |

精度↑ ブレ↓

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* 正直な効果量：**+0.79pt**
	* 11/15シードでDAPT勝利
* 単発の +2.3pt は pre_daptの**下振れ**で膨らんでいた

</div>
</div>
</div>

<div class="simple-box" data-markdown>

* 結論：DAPTの効果は運の一発ではなく、**小さいが有意で安定**

</div>

---

### 5. 感情分析の限界 <span style="font-size:0.6em"></span>

<div class="highlight-box" data-markdown>

* DAPTで伸びたが、それでも **OOD Acc は約89%で頭打ち**
* 原因はモデルではなく **ラベルそのもの**
	* `voted_up`（👍/👎）は「本文の感情」ではなく「**推奨するか**」
	* 本文がネガでも👍、ポジでも👎 が混ざる → **ラベル自体がノイズ**

</div>

<div class="simple-box" data-markdown>

* つまり残りの誤りは、賢いモデルでも**消せない領域**に入っている

</div>

---

### 消せない誤り＝Irreducible Error

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

**ラベルと本文がズレる例**

* 皮肉：「最高のバグ製造機 10/10」
	* 本文はネガ → でも 👍
* 両面評価：「神ゲーだが最適化が酷い」
	* 人によって 👍／👎 が割れる

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* これは**正解ラベル自体が曖昧**である
	* モデルをどれだけ鍛えても消えない（**Irreducible Error**）
* 人が見ても読み取れない、ラベルのつけ間違いのようなものがどうしても存在する。

</div>
</div>
</div>

<div class="simple-box" data-markdown>

* 「精度の天井」は性能不足とは限らず、**問題設定の限界**だった

</div>

---

### 6. まとめ — 学んだこと

<div class="highlight-box" data-markdown>

* **比較は公平に**：未知データ(OOD)＋対照実験で「微調整の価値」を切り分けた
* **DAPTは効く**：汎用モデルに有意に勝利。直したのは対比・否定の長文
* **差は統計で確かめる**：seed1発の数字を鵜呑みにせず、多シードで頑健性を検証
* 精度、性能の問題と思っていたが、そもそもの限界があった

</div>
