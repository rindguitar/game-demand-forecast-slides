### 土台：何を作っているか

<div class="simple-box" data-markdown>

* Steam APIのレビューを集め、**感情分析（POSITIVE / NEGATIVE）** を学習
* ベースは **DistilBERT**。Steamレビュー（学習7ゲーム・1万件）で微調整
* 目的は「レビューの賛否を定量化」してゲーム需要予測につなげること
* ラベルは `voted_up`（👍/👎）を流用 — 手軽だが**粗いproxy**（後で効いてくる）

</div>

---

### 問い：微調整に意味はあった？ <span style="font-size:0.6em">#21</span>

<div class="highlight-box" data-markdown>

* 自作モデルは、**未調整の汎用モデル**より本当に強いのか？
* 検証法：**OOD（Out-of-Distribution）テスト**
	* 学習に使っていない **20ゲーム・2000件**（balanced）で比較
	* 学習データで測ると「教科書持ち込み」＝**データリーケージ**になる

</div>

<div class="simple-box" data-markdown>

* 自作（Steam微調整）vs **sst-2**（汎用 `distilbert-...-sst-2-english`）

</div>

---

### #21 結果：ほぼ互角だった

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

| 指標 | 自作(Steam) | sst-2(汎用) |
|---|---|---|
| Accuracy | **86.5%** | 85.1% |
| Precision | 83.5% | **87.7%** |
| Recall | **91.0%** | 81.6% |
| F1 | **87.1%** | 84.6% |

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* Accuracyの差 +1.4pt は…
* **McNemar検定 p=0.105**
	* → **有意差なし（誤差圏）**
* 微調整の付加価値は限定的

</div>
</div>
</div>

---

### #21 解釈：変わったのは「偏り」

<div class="simple-box" data-markdown>

* 変わったのは**スキル**ではなく**判定の偏り**
	* 自作 = **Recall寄り**（ポジと言いすぎ → FP多・皮肉に弱い）
	* sst-2 = **Precision寄り**（慎重）
* 土台のDistilBERTが性能の大半を担っていた

</div>

<div class="highlight-box" data-markdown>

* 次の打ち手 → **DAPT**（ドメイン適応事前学習）で土台から鍛え直す

</div>

---

### 打ち手：DAPTとは <span style="font-size:0.6em">#19</span>

<div class="highlight-box" data-markdown>

* **DAPT = Domain-Adaptive Pre-Training**
* 未ラベルのSteamレビューでDistilBERTを **MLM継続学習** → 「ゲームの言葉」に適応
* その土台の上で感情分析を微調整する

</div>

<div class="simple-box" data-markdown>

* コーパス：**10万件・572ゲーム**（OOD20＋学習7ゲームを除外＝リーケージ防止）
* MLM 3エポック（GTX1060で約129分・**loss 3.55→2.11**）

</div>

---

### #19 結果：汎用モデルに有意に勝利

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

**OOD（未知20ゲーム・2000件）**

| モデル | OOD Acc |
|---|---|
| **Self-DAPT** | **88.8%** |
| Self-preDAPT | 86.5% |
| SST-2 | 85.1% |

</div>
</div>
<div class="col-right">
<div class="simple-box" data-markdown>

**in-domain（1万件 test）**

| 指標 | pre | DAPT |
|---|---|---|
| Test Acc | 84.7% | **87.8%** |
| Train−Test gap | 12.8 | **7.4** |

過学習が縮小＝汎化向上

</div>
</div>
</div>

<div class="highlight-box" data-markdown>

* McNemar：DAPT vs preDAPT **p=0.0001**／DAPT vs sst-2 **p<0.0001**（ともに有意）

</div>

### #19/#25 DAPTは何を直したか

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

| | 直した | 壊した | 正味 |
|---|---|---|---|
| **FP** | 75 | 23 | **−52** |
| FN | 19 | 25 | +6 |
| 計 | 94 | 48 | **+46** |

純改善のほぼ全てが**FP削減**

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* 直したのは「**great … but terrible**」型
	* 否定語あり：57% vs 38%
	* 接続詞混合(but)：55% vs 38%
* 対比・否定の長文を**ポジと誤読しなくなった**
* 代償：短文でわずかに過慎重化

</div>
</div>
</div>

---

### 落とし穴：暗記を測っていた <span style="font-size:0.6em">#25</span>

<div class="highlight-box" data-markdown>

* OOD精度は上がったのに、誤分類分析では **DAPTの方が誤りが多い**（旧577→新681）という逆の結果

</div>

<div class="simple-box" data-markdown>

* 原因：分析スクリプトが **`reviews_10000` 全件（約70%は訓練データ）** で予測していた
* 過学習の少ないDAPTは**暗記が少ない** → 訓練部分の誤りが増えただけ
* つまり測っていたのは「汎化」ではなく **「訓練データの暗記」**（train acc 旧97.5%→新95.2%）

</div>

---

### #25 修正：本来の用途に合わせる

<div class="simple-box" data-markdown>

* 複数スクリプトが開発用データを**ハードコード**していた
* `--input` / `--model` / `--output` で**任意データ・任意モデル**を渡せるよう汎用化
	* `analyze_misclassified.py` / `extract_topics.py` / `explain_misclassified.py`
* 新規 `diff_misclassified.py`：2モデルの誤分類を差分し fixed/broke を抽出
* → **未知データ(OOD)で正しく**「DAPTが直した／壊した」を測れるように

</div>

---

### 頑健性：その差は運じゃない？ <span style="font-size:0.6em">#24</span>

<div class="highlight-box" data-markdown>

* 前の結果は **seed=42 の1回ずつ**。シードの運で出た差かもしれない
* 気づき：固定すべき乱数は2か所
	* データ分割（`train_test_split`）… 固定済み
	* **学習の内部**（重み初期化・shuffle・dropout）`torch.manual_seed` … **抜けていた**

</div>

<div class="simple-box" data-markdown>

* 方針A：学習を完全固定し、**別シード×1回ずつ**で 0〜14 の **15シード**を実行

</div>

---

### #24 結果：+2.3ptは「盛れていた」

<div class="container">
<div class="col-left">
<div class="simple-box" data-markdown>

**OOD Acc（n=15）**

| | mean ± SD |
|---|---|
| **DAPT** | **88.73% ± 0.54** |
| vanilla | 87.94% ± 0.78 |

精度↑ かつ ブレ↓

</div>
</div>
<div class="col-right">
<div class="highlight-box" data-markdown>

* 正直な効果量：**+0.79pt**
	* 11/15シードでDAPT勝利
	* paired t-test **p=0.0053**（有意）
* 単発の +2.3pt は vanillaの**下振れ**で膨らんでいた

</div>
</div>
</div>

<div class="simple-box" data-markdown>

* 結論：DAPTの効果は運の一発ではなく、**小さいが有意で安定**

</div>

---

### まとめ — 学んだこと

<div class="highlight-box" data-markdown>

* **比較は公平に**：未知データ(OOD)＋対照実験で「微調整の価値」を切り分けた（#21）
* **DAPTは効く**：汎用モデルに有意に勝利。直したのは対比・否定の長文（#19）
* **測り方を疑う**：訓練データで測ると“暗記”を見てしまう（#25）
* **差は統計で確かめる**：seed1発の数字を鵜呑みにせず、多シードで頑健性を検証（#24）
* 残る天井：ラベルが `voted_up` proxy ＝ 皮肉・両面評価はノイズ（Irreducible Error）

</div>
